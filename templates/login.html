<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход — ABCENTRUM</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="flex-shrink:0;margin-right:8px">
        <rect x="2" y="2" width="10" height="10" rx="2.5" fill="#FF555D"/>
        <rect x="16" y="2" width="10" height="10" rx="2.5" fill="#FF555D" opacity="0.55"/>
        <rect x="2" y="16" width="10" height="10" rx="2.5" fill="#FF555D" opacity="0.55"/>
        <rect x="16" y="16" width="10" height="10" rx="2.5" fill="#FF555D" opacity="0.25"/>
      </svg>
      ABCENTRUM
    </div>
    <p class="login-subtitle">Outreach Platform</p>
    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="login" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2H3a1 1 0 00-1 1v8a1 1 0 001 1h2M9.5 10l3-3-3-3M12.5 7H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Войти
      </button>
    </form>
  </div>
</body>
</html>
