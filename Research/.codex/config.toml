# Project-scoped MCP servers for Promtechnopark Mitino tenant research.
# Secrets are intentionally read from environment variables.
# Restart Codex after setting keys so these servers become available.

[mcp_servers.firecrawl]
command = "npx"
args = ["-y", "firecrawl-mcp"]
env = { FIRECRAWL_API_KEY = "${FIRECRAWL_API_KEY}" }

[mcp_servers.perplexity]
command = "npx"
args = ["-y", "@perplexity-ai/mcp-server"]
env = { PERPLEXITY_API_KEY = "${PERPLEXITY_API_KEY}" }

[mcp_servers.yandex_search]
command = "sh"
args = [
  "-lc",
  "exec npx -y mcp-remote https://d5de9siimt9bkld7viic.emzafcgx.apigw.yandexcloud.net:3000/sse --header \"ApiKey:$YANDEX_SEARCH_API_KEY\" --header \"FolderId:$YANDEX_FOLDER_ID\""
]
env = { YANDEX_SEARCH_API_KEY = "${YANDEX_SEARCH_API_KEY}", YANDEX_FOLDER_ID = "${YANDEX_FOLDER_ID}" }

[mcp_servers.brave_search]
command = "npx"
args = ["-y", "@brave/brave-search-mcp-server"]
env = { BRAVE_API_KEY = "${BRAVE_API_KEY}" }

[mcp_servers.exa]
command = "npx"
args = ["-y", "exa-mcp-server"]
env = { EXA_API_KEY = "${EXA_API_KEY}" }

[mcp_servers.tavily]
command = "npx"
args = ["-y", "tavily-mcp"]
env = { TAVILY_API_KEY = "${TAVILY_API_KEY}" }

[mcp_servers.serpapi]
command = "sh"
args = [
  "-lc",
  "exec npx -y mcp-remote \"https://mcp.serpapi.com/$SERPAPI_API_KEY/mcp\""
]
env = { SERPAPI_API_KEY = "${SERPAPI_API_KEY}" }
